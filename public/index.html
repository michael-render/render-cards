<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rendervous Trading Cards</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="form-container">
    <div class="form-header">
      <h1>Rendervous Cards</h1>
      <p>Create your trading card</p>
      <a href="/gallery.html" class="gallery-link">View Gallery</a>
    </div>

    <form id="card-form">
      <div class="field">
        <label for="name">What's your name?</label>
        <input type="text" id="name" placeholder="Your name" required>
      </div>

      <div class="field">
        <label for="role">What's your role at Render?</label>
        <input type="text" id="role" placeholder="e.g. Software Engineer, Designer, PM" required>
      </div>

      <div class="photo-section">
        <label>Upload a photo of yourself</label>
        <div class="file-upload">
          <input type="file" id="photo-file" accept="image/*">
          <div class="file-upload-text"><strong>Click to upload</strong> or drag a photo</div>
        </div>
        <div class="photo-preview" id="photo-preview"></div>
      </div>

      <div class="field">
        <label for="hobby">What do you like to do outside of work?</label>
        <input type="text" id="hobby" placeholder="e.g. Surfing, baking sourdough, competitive napping">
      </div>

      <div class="field">
        <label for="unpopular-opinion">What's your most #unpopular-opinion?</label>
        <input type="text" id="unpopular-opinion" placeholder="e.g. Tabs are better than spaces">
      </div>

      <div class="field">
        <label for="work-hack">What's a work hack you swear by?</label>
        <input type="text" id="work-hack" placeholder="e.g. No meetings before 11am">
      </div>

      <div class="field">
        <label for="emoji">What's your favorite emoji?</label>
        <input type="text" id="emoji" placeholder="e.g. :cat-nodding: or just paste one 🐱">
      </div>

      <div class="field">
        <label for="desert-island">3 non-essentials you'd bring to a desert island?</label>
        <input type="text" id="desert-island" placeholder="e.g. Hammock, hot sauce, a good playlist">
      </div>

      <div class="field">
        <label for="superpower">What's your mundane superpower?</label>
        <input type="text" id="superpower" placeholder="e.g. I always pick the fastest checkout line">
      </div>

      <div class="field">
        <label for="motivation">What motivates you?</label>
        <input type="text" id="motivation" placeholder="e.g. Shipping things people love">
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Generate Card</button>
      <div class="status" id="status"></div>
    </form>
  </div>

  <script src="/js/form.js"></script>
</body>
</html>
